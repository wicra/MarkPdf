<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkPDF — Markdown + Mermaid vers PDF</title>
  <style>
    /* ── Reset & variables ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9;
      --header-bg: #0f172a;
      --header-fg: #f8fafc;
      --panel: #ffffff;
      --border: #e2e8f0;
      --accent: #6366f1;
      --accent-h: #4f46e5;
      --accent-fg: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      --radius: 8px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--header-bg);
      color: var(--header-fg);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 54px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo svg { flex-shrink: 0; }
    .tagline { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .header-spacer { flex: 1; }
    .header-links { display: flex; align-items: center; gap: 8px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: var(--border);
    }
    .panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      background: var(--panel);
      overflow: hidden;
      min-width: 0;
    }

    /* ── Panel toolbar ───────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      height: 46px;
      flex-shrink: 0;
    }
    .toolbar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }
    .t-spacer { flex: 1; }
    .filename-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.12s, opacity 0.12s;
      white-space: nowrap;
      outline: none;
    }
    .btn:focus-visible { box-shadow: 0 0 0 2px var(--accent); }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    /* ── Editor ──────────────────────────────────────────────────── */
    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 20px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      background: #fff;
      tab-size: 2;
      overflow-y: auto;
    }
    #editor::placeholder { color: #cbd5e1; }
    #file-input { display: none; }

    /* ── Preview ─────────────────────────────────────────────────── */
    #preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      background: #fff;
    }

    /* Preview typography */
    #preview-body { max-width: 780px; }
    #preview-body h1 { font-size: 22px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin: 0 0 18px; color: #0f172a; }
    #preview-body h2 { font-size: 17px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin: 28px 0 12px; color: #1e293b; }
    #preview-body h3 { font-size: 14px; margin: 18px 0 8px; color: #334155; }
    #preview-body h4 { font-size: 13px; margin: 14px 0 6px; color: #475569; }
    #preview-body p { margin-bottom: 12px; font-size: 13px; line-height: 1.7; }
    #preview-body ul, #preview-body ol { padding-left: 20px; margin-bottom: 12px; font-size: 13px; }
    #preview-body li { margin-bottom: 4px; }
    #preview-body strong { font-weight: 600; }
    #preview-body em { font-style: italic; }
    #preview-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 22px 0; }
    #preview-body blockquote {
      border-left: 3px solid #6366f1;
      padding: 8px 16px;
      background: #f5f3ff;
      color: #4b5563;
      border-radius: 0 6px 6px 0;
      margin: 14px 0;
      font-style: italic;
    }
    #preview-body table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 12px; }
    #preview-body th, #preview-body td { border: 1px solid #e2e8f0; padding: 7px 11px; text-align: left; }
    #preview-body th { background: #f1f5f9; font-weight: 600; }
    #preview-body tr:nth-child(even) td { background: #fafafa; }
    #preview-body code {
      font-family: var(--mono);
      font-size: 11.5px;
      background: #f1f5f9;
      padding: 2px 5px;
      border-radius: 3px;
      color: #be123c;
    }
    #preview-body pre {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 13px;
      overflow-x: auto;
      margin: 14px 0;
    }
    #preview-body pre code { background: none; color: #334155; padding: 0; }
    #preview-body a { color: #6366f1; text-decoration: none; }
    #preview-body a:hover { text-decoration: underline; }

    /* Mermaid in preview */
    #preview-body .mermaid {
      display: flex;
      justify-content: center;
      margin: 16px 0;
      overflow-x: auto;
    }
    #preview-body .mermaid svg { max-width: 100%; height: auto; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      text-align: center;
      gap: 10px;
      pointer-events: none;
    }
    .empty-state svg { opacity: 0.35; }
    .empty-state p { font-size: 13px; }

    /* ── Loading overlay for PDF ─────────────────────────────────── */
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: white;
    }
    #loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; font-weight: 500; }
    .loading-sub { font-size: 12px; color: #94a3b8; }

    /* ── Toast notification ──────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #16a34a; }
    #toast.error { background: #dc2626; }

    /* ── Drag-over hint ──────────────────────────────────────────── */
    #editor.drag-over {
      background: #f5f3ff;
      outline: 2px dashed #6366f1;
      outline-offset: -4px;
    }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <rect width="26" height="26" rx="6" fill="#6366f1"/>
      <path d="M7 7h5l3 8 3-8h4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M6 17h14" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M9 20h8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    MarkPDF
  </div>
  <span class="tagline">Markdown + Mermaid &rarr; PDF</span>
  <div class="header-spacer"></div>
  <div class="header-links">
    <span class="badge">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      Open Source

</header>

<!-- ── Workspace ─────────────────────────────────────────────────────────── -->
<div class="workspace">

  <!-- Left panel: Editor -->
  <div class="panel">
    <div class="toolbar">
      <span class="toolbar-label">Éditeur</span>
      <input type="file" id="file-input" accept=".md,.txt,.markdown">
      <button class="btn btn-ghost" id="upload-btn" title="Ouvrir un fichier .md">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        Ouvrir
      </button>
      <span class="t-spacer"></span>
      <span class="filename-tag" id="filename-tag">sans titre</span>
      <button class="btn btn-ghost" id="clear-btn" title="Effacer le contenu">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Effacer
      </button>
    </div>
    <textarea id="editor" placeholder="Collez votre Markdown ici, ou ouvrez un fichier .md…

Glissez-déposez un fichier directement dans l'éditeur."></textarea>
  </div>

  <!-- Right panel: Preview -->
  <div class="panel">
    <div class="toolbar">
      <span class="toolbar-label">Aperçu</span>
      <span class="t-spacer"></span>
      <button class="btn btn-primary" id="export-btn" disabled>
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>

          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <p>L'aperçu s'affiche ici au fur et à mesure que vous écrivez.</p>

</div>

<!-- ── Loading overlay ───────────────────────────────────────────────────── -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Génération du PDF en cours…</div>
  <div class="loading-sub">Rendu des diagrammes Mermaid et mise en page A4</div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
'use strict';

// ── Mermaid init ────────────────────────────────────────────────────────────
mermaid.initialize({
  startOnLoad: false,
  theme: 'default',
  securityLevel: 'loose',
  flowchart: { useMaxWidth: true, htmlLabels: true },
  sequence: { useMaxWidth: true },
});

// ── DOM refs ────────────────────────────────────────────────────────────────
const editor       = document.getElementById('editor');
const fileInput    = document.getElementById('file-input');
const uploadBtn    = document.getElementById('upload-btn');
const clearBtn     = document.getElementById('clear-btn');
const exportBtn    = document.getElementById('export-btn');
const previewBody  = document.getElementById('preview-body');
const emptyState   = document.getElementById('empty-state');
const filenameTag  = document.getElementById('filename-tag');
const loadingOverlay = document.getElementById('loading-overlay');
const toast        = document.getElementById('toast');

let currentFilename = 'document';
let previewTimer;
let toastTimer;

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = `show ${type}`;
  toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
}

// ── Preview rendering ────────────────────────────────────────────────────────
async function renderPreview() {
  const md = editor.value;

  if (!md.trim()) {
    previewBody.innerHTML = '';
    previewBody.appendChild(emptyState);
    exportBtn.disabled = true;
    return;
  }

  // Parse markdown → HTML
  const html = marked.parse(md);
  previewBody.innerHTML = html;
  exportBtn.disabled = false;

  // Transform ```mermaid blocks into divs
  previewBody.querySelectorAll('pre code.language-mermaid').forEach(el => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.closest('pre').replaceWith(div);
  });

  // Render diagrams (nodes without data-processed)
  const mermaidNodes = Array.from(previewBody.querySelectorAll('.mermaid'));
  if (mermaidNodes.length > 0) {
    try {
      await mermaid.run({ nodes: mermaidNodes });
    } catch (e) {
      console.warn('Mermaid preview error:', e.message);
    }
  }
}

// Debounced live preview
editor.addEventListener('input', () => {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 350);
});

// ── PDF export ───────────────────────────────────────────────────────────────
exportBtn.addEventListener('click', async () => {
  const md = editor.value.trim();
  if (!md) return;

  exportBtn.disabled = true;
  loadingOverlay.classList.add('active');

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ markdown: md, filename: currentFilename }),
    });

    if (resp.status === 429) {
      const { error } = await resp.json();
      showToast(error, 'error');
      return;
    }
    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      showToast(body.error || 'Erreur lors de la génération.', 'error');
      return;
    }

    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = currentFilename.replace(/\.md$/i, '') + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('PDF téléchargé avec succès.', 'success');

  } catch (err) {
    showToast('Impossible de joindre le serveur.', 'error');
  } finally {
    exportBtn.disabled = false;
    loadingOverlay.classList.remove('active');
  }
});

// ── File upload ───────────────────────────────────────────────────────────────
uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  loadFile(file);
  fileInput.value = '';
});

function loadFile(file) {
  if (file.size > 1_000_000) {
    showToast('Fichier trop volumineux (max 1 Mo).', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    editor.value = e.target.result;
    setFilename(file.name);
    renderPreview();
  };
  reader.readAsText(file, 'utf-8');
}

function setFilename(name) {
  currentFilename = name.replace(/\.(md|txt|markdown)$/i, '') || 'document';
  filenameTag.textContent = currentFilename;
  filenameTag.title       = currentFilename;
}

// ── Clear ─────────────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  if (editor.value && !confirm('Effacer le contenu de l\'éditeur ?')) return;
  editor.value = '';
  currentFilename = 'document';
  filenameTag.textContent = 'sans titre';
  renderPreview();
});

// ── Drag & drop on editor ─────────────────────────────────────────────────────
editor.addEventListener('dragover', e => {
  e.preventDefault();
  editor.classList.add('drag-over');
});
editor.addEventListener('dragleave', () => editor.classList.remove('drag-over'));
editor.addEventListener('drop', e => {
  e.preventDefault();
  editor.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

// ── Sample content on first load ──────────────────────────────────────────────
const SAMPLE = `# Mon document de test

## Architecture

Voici un exemple de diagramme Mermaid :

\`\`\`mermaid
graph LR
    A[Utilisateur] --> B[Navigateur]
    B --> C[Serveur]
    C --> D[(Base de données)]
\`\`\`

## Tableau de comparaison

| Outil | Langage | Diagrammes | Export PDF |
|-------|---------|------------|------------|
| MarkPDF | Node.js | Mermaid | Oui |
| Pandoc | Haskell | Non natif | Oui |
| Typora | Electron | Mermaid | Oui (payant) |

## Fonctionnalités

- Rendu **Markdown** complet
- Diagrammes \`Mermaid\` (flowchart, séquence, classes…)
- Export PDF A4 avec numérotation de pages
- Aperçu temps réel

> Collez votre propre Markdown ou ouvrez un fichier .md pour commencer.
`;

editor.value = SAMPLE;
renderPreview();
</script>
</body>
</html>
